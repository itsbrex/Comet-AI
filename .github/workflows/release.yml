name: 🚀 Publish Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.4) - leave empty to use package.json'
        required: false
      release_name:
        description: 'Release Name'
        required: false
      update_firebase:
        description: 'Update Firebase with download links'
        required: false
        type: boolean
        default: true
      auto_tag:
        description: 'Auto-tag from package.json version'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

env:
  NODE_VERSION: '22'
  FLUTTER_VERSION: 'stable'

jobs:
  # ============================================================================
  # PARSE VERSION
  # ============================================================================
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_stable: ${{ steps.version.outputs.is_stable }}
      is_auto_tag: ${{ steps.version.outputs.is_auto_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version
        id: version
        run: |
          # Check if this is an auto-tag from package.json
          IS_AUTO_TAG="false"
          if [[ "${{ github.event.inputs.auto_tag }}" == "true" ]] || [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            IS_AUTO_TAG="true"
          fi
          
          # Get version from package.json
          if [[ "$IS_AUTO_TAG" == "true" ]]; then
            TAG="v$(node -p "require('./comet-browser/package.json').version")"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="v$(node -p "require('./comet-browser/package.json').version")"
          fi
          
          VERSION="${TAG#v}"
          
          # Check if stable release (no suffix like -beta, -rc, etc.)
          if [[ "$TAG" == *"-"* ]]; then
            IS_STABLE="false"
          else
            IS_STABLE="true"
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_stable=$IS_STABLE" >> $GITHUB_OUTPUT
          echo "is_auto_tag=$IS_AUTO_TAG" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git tag | grep -q "^${{ steps.version.outputs.tag }}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag if needed
        if: steps.check_tag.outputs.exists == 'false' && steps.version.outputs.is_auto_tag == 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  # ============================================================================
  # GENERATE CHANGELOG
  # ============================================================================
  changelog:
    name: Generate Changelog
    needs: get-version
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          TAG=${{ needs.get-version.outputs.tag }}
          VERSION=${{ needs.get-version.outputs.version }}
          
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git log --oneline -1 --format="%H" | head -1)
          fi
          
          # Generate changelog
          CHANGELOG="# 🚀 Comet AI Browser v${VERSION}\n\n"
          CHANGELOG+="**Release Date:** $(date '+%B %d, %Y')\n\n"
          CHANGELOG+="## 📝 What's New\n\n"
          
          # Get commits between tags
          COMMITS=$(git log ${PREV_TAG}..HEAD --oneline --format="* %s (%h)" 2>/dev/null || echo "* Initial release")
          
          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -iE "(feat|feature|add|new)" | head -10 || echo "")
          FIXES=$(echo "$COMMITS" | grep -iE "(fix|bug|patch)" | head -10 || echo "")
          IMPROVEMENTS=$(echo "$COMMITS" | grep -iE "(improve|enhance|refactor|update)" | head -10 || echo "")
          OTHER=$(echo "$COMMITS" | grep -vE "(feat|fix|improve|enhance|refactor|update|merge)" | head -10 || echo "")
          
          if [ -n "$FEATURES" ]; then
            CHANGELOG+="### ✨ New Features\n$FEATURES\n\n"
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG+="### 🐛 Bug Fixes\n$FIXES\n\n"
          fi
          if [ -n "$IMPROVEMENTS" ]; then
            CHANGELOG+="### ⚡ Improvements\n$IMPROVEMENTS\n\n"
          fi
          if [ -n "$OTHER" ]; then
            CHANGELOG+="### 📦 Other Changes\n$OTHER\n\n"
          fi
          
          CHANGELOG+="---\n"
          CHANGELOG+="*Generated automatically from commit history*\n"
          
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ============================================================================
  # ANDROID BUILD
  # ============================================================================
  build-android:
    name: Build Android
    needs: get-version
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Flutter Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.flutter
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        working-directory: flutter_browser_app
        run: flutter pub get

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > flutter_browser_app/android/app/google-services.json
          fi

      - name: Decode Keystore
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | sed 's/-----BEGIN CERTIFICATE-----//g' | sed 's/-----END CERTIFICATE-----//g' | tr -d '\n\r' | base64 -d > flutter_browser_app/android/app/upload-keystore.jks
          fi

      - name: Create key.properties
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > flutter_browser_app/android/key.properties
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> flutter_browser_app/android/key.properties
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> flutter_browser_app/android/key.properties
            echo "storeFile=upload-keystore.jks" >> flutter_browser_app/android/key.properties
          fi

      - name: Build APK
        working-directory: flutter_browser_app
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4096m"
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-android
          path: flutter_browser_app/build/app/outputs/flutter-apk/app-release.apk

  # ============================================================================
  # IOS BUILD
  # ============================================================================
  build-ios:
    name: Build iOS
    needs: get-version
    runs-on: macos-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        working-directory: flutter_browser_app
        run: flutter pub get

      - name: Create GoogleService-Info.plist
        continue-on-error: true
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" > flutter_browser_app/ios/Runner/GoogleService-Info.plist
          fi

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: flutter_browser_app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('flutter_browser_app/ios/Podfile.lock') }}

      - name: Build iOS
        working-directory: flutter_browser_app
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: flutter_browser_app
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Comet-AI.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-ios
          path: flutter_browser_app/Comet-AI.ipa

  # ============================================================================
  # DESKTOP BUILD
  # ============================================================================
  build-desktop:
    name: Build Desktop (${{ matrix.target }})
    needs: get-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        target: [windows, macos, linux]
        include:
          - target: windows
            os: windows-latest
            build_cmd: npm run dist:win
            artifact_glob: |
              comet-browser/release/*.exe
            artifact_name: comet-ai-windows
          - target: macos
            os: macos-latest
            build_cmd: "npm run build && npx electron-builder --mac --x64 --publish never"
            artifact_glob: "comet-browser/release/*.dmg"
            artifact_name: comet-ai-macos
          - target: linux
            os: ubuntu-latest
            build_cmd: npm run build && npx electron-builder --linux AppImage --x64
            artifact_glob: "comet-browser/release/*.AppImage"
            artifact_name: comet-ai-linux

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: comet-browser/package-lock.json

      - name: Install Linux Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libarchive-tools icnsutils libxtst-dev libpng-dev libx11-dev

      - name: Remove package-lock.json (Non-Windows)
        if: runner.os != 'Windows'
        working-directory: comet-browser
        run: rm -f package-lock.json

      - name: Remove package-lock.json (Windows)
        if: runner.os == 'Windows'
        working-directory: comet-browser
        run: if (Test-Path package-lock.json) { Remove-Item package-lock.json -Force }
        shell: pwsh

      - name: Install Dependencies
        working-directory: comet-browser
        run: npm install --legacy-peer-deps

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: comet-browser/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('comet-browser/package-lock.json') }}

      - name: Build App
        if: matrix.target != 'macos'
        working-directory: comet-browser
        env:
          NEXT_PUBLIC_APP_NAME: Comet
          NEXT_PUBLIC_APP_VERSION: ${{ needs.get-version.outputs.version }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}
          CSC_LINK: ${{ secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD || '' }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD || '' }}
        run: ${{ matrix.build_cmd }}

      - name: Build App (macOS)
        if: matrix.target == 'macos'
        working-directory: comet-browser
        env:
          NEXT_PUBLIC_APP_NAME: Comet
          NEXT_PUBLIC_APP_VERSION: ${{ needs.get-version.outputs.version }}
          APPLE_SIGNING_IDENTITY: "-"
        run: ${{ matrix.build_cmd }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}

  # ============================================================================
  # CREATE RELEASE
  # ============================================================================
  create-release:
    name: Create Release
    needs: [get-version, changelog, build-android, build-ios, build-desktop]
    runs-on: ubuntu-latest
    if: needs.get-version.outputs.tag != ''
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List Artifacts
        run: ls -la release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ${{ needs.changelog.outputs.changelog }}
            
            ## 📥 Download Installers
            
            Download the latest release for your platform below!
            
            ### Desktop
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `Comet.Browser.Setup.*.exe` or `.msix` |
            | 🍎 macOS | `Comet.Browser-*.dmg` |
            | 🐧 Linux | `Comet.Browser-*.AppImage` |
            
            ### Mobile
            | Platform | File |
            |----------|------|
            | 📱 Android | `app-release.apk` |
            | 🍎 iOS | `Comet-AI.ipa` |
            
            ---
            Built with ❤️ by [Latestinssan](https://github.com/Preet3627)
          draft: false
          prerelease: ${{ needs.get-version.outputs.is_stable == 'false' }}
          generate_release_notes: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Assets
        run: |
          for file in release-artifacts/*; do
            if [ -f "$file" ]; then
              echo "📤 Uploading: $file"
              gh release upload "${{ needs.get-version.outputs.tag }}" "$file" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # UPDATE FIREBASE
  # ============================================================================
  update-firebase:
    name: Update Firebase
    needs: [get-version, create-release]
    runs-on: ubuntu-latest
    if: inputs.update_firebase == true || github.event.inputs.update_firebase == true
    environment: Production
    steps:
      - name: Update Firebase Downloads
        run: |
          TAG="${{ needs.get-version.outputs.tag }}"
          
          curl -X PUT \
            "https://${{ secrets.FIREBASE_PROJECT_ID }}-default-rtdb.firebaseio.com/config/downloads.json?auth=${{ secrets.FIREBASE_ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "windows": "https://github.com/Preet3627/Comet-AI/releases/download/'"$TAG"'/Comet.Browser.Setup.exe",
              "mac": "https://github.com/Preet3627/Comet-AI/releases/download/'"$TAG"'/Comet.Browser.dmg",
              "linux": "https://github.com/Preet3627/Comet-AI/releases/download/'"$TAG"'/Comet.Browser.AppImage",
              "android": "https://github.com/Preet3627/Comet-AI/releases/download/'"$TAG"'/app-release.apk",
              "ios": "https://github.com/Preet3627/Comet-AI/releases/download/'"$TAG"'/Comet-AI.ipa"
            }'
        continue-on-error: true

  # ============================================================================
  # SUMMARY
  # ============================================================================
  summary:
    name: Summary
    needs: [get-version, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Print Summary
        run: |
          echo "🎉 Release v${{ needs.get-version.outputs.version }} created!"
          echo "🔗 https://github.com/Preet3627/Comet-AI/releases/${{ needs.get-version.outputs.tag }}"
