name: Build All Platforms (Stable)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  actions: read

env:
  NODE_VERSION: '20'
  FLUTTER_VERSION: 'stable'
  ELECTRON_CACHE_DIR: '.electron-cache'
  NODE_CACHE_DIR: '.node-cache'

jobs:
  # ============================================================================
  # ANDROID BUILD
  # ============================================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          flutter-version: '3.27.0'

      - name: Cache Flutter Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        working-directory: flutter_browser_app
        run: flutter pub get

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > flutter_browser_app/android/app/google-services.json
            echo "google-services.json created"
          else
            echo "::warning::GOOGLE_SERVICES_JSON not set"
          fi

      - name: Decode Keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | sed 's/-----BEGIN CERTIFICATE-----//g' | sed 's/-----END CERTIFICATE-----//g' | tr -d '\n\r' | base64 -d > flutter_browser_app/android/app/upload-keystore.jks

      - name: Create key.properties
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > flutter_browser_app/android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> flutter_browser_app/android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> flutter_browser_app/android/key.properties
          echo "storeFile=upload-keystore.jks" >> flutter_browser_app/android/key.properties

      - name: Build APK
        working-directory: flutter_browser_app
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4096m"
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-android-${{ github.run_number }}
          path: flutter_browser_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 5

  # ============================================================================
  # IOS BUILD
  # ============================================================================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          flutter-version: '3.27.0'

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: flutter_browser_app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('flutter_browser_app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install dependencies
        working-directory: flutter_browser_app
        run: flutter pub get

      - name: Create GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" > flutter_browser_app/ios/Runner/GoogleService-Info.plist
          fi

      - name: Build iOS
        working-directory: flutter_browser_app
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: flutter_browser_app
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Comet-AI.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-ios-${{ github.run_number }}
          path: flutter_browser_app/Comet-AI.ipa
          retention-days: 5

  # ============================================================================
  # DESKTOP BUILD - WINDOWS
  # ============================================================================
  build-desktop-windows:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: comet-browser/package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ${{ env.ELECTRON_CACHE_DIR }}
          key: ${{ runner.os }}-electron-${{ hashFiles('comet-browser/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Dependencies (npm ci - deterministic)
        working-directory: comet-browser
        run: |
          npm ci --legacy-peer-deps

      - name: Rebuild Native Modules
        working-directory: comet-browser
        run: |
          npx electron-rebuild -f -w robotjs || npx electron-rebuild -f -w sharp || echo "Rebuild completed"

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: comet-browser/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('comet-browser/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build Windows
        working-directory: comet-browser
        env:
          NEXT_PUBLIC_APP_NAME: Comet
          NEXT_PUBLIC_APP_VERSION: ${{ github.ref_name }}
          ELECTRON_CACHE_DIR: ${{ env.ELECTRON_CACHE_DIR }}
        run: npm run dist:win

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-desktop-windows-${{ github.run_number }}
          path: comet-browser/release/*.exe
          retention-days: 5

  # ============================================================================
  # DESKTOP BUILD - MACOS
  # ============================================================================
  build-desktop-macos:
    name: Build Desktop (macOS)
    runs-on: macos-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: comet-browser/package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ${{ env.ELECTRON_CACHE_DIR }}
          key: ${{ runner.os }}-electron-${{ hashFiles('comet-browser/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Dependencies (npm ci - deterministic)
        working-directory: comet-browser
        run: |
          npm ci --legacy-peer-deps

      - name: Rebuild Native Modules
        working-directory: comet-browser
        run: |
          npx electron-rebuild -f -w robotjs || npx electron-rebuild -f -w sharp || echo "Rebuild completed"

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: comet-browser/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('comet-browser/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build macOS
        working-directory: comet-browser
        env:
          NEXT_PUBLIC_APP_NAME: Comet
          NEXT_PUBLIC_APP_VERSION: ${{ github.ref_name }}
          ELECTRON_CACHE_DIR: ${{ env.ELECTRON_CACHE_DIR }}
        run: npm run dist:mac

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-desktop-macos-${{ github.run_number }}
          path: comet-browser/release/*.dmg
          retention-days: 5

  # ============================================================================
  # DESKTOP BUILD - LINUX
  # ============================================================================
  build-desktop-linux:
    name: Build Desktop (Linux)
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libarchive-tools \
            icnsutils libxtst-dev libpng-dev libx11-dev \
            libsecret-1-dev libx11-xcb-dev libxcb-dri3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: comet-browser/package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ${{ env.ELECTRON_CACHE_DIR }}
          key: ${{ runner.os }}-electron-${{ hashFiles('comet-browser/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Dependencies (npm ci - deterministic)
        working-directory: comet-browser
        run: |
          npm ci --legacy-peer-deps

      - name: Rebuild Native Modules
        working-directory: comet-browser
        run: |
          npx electron-rebuild -f -w robotjs || npx electron-rebuild -f -w sharp || echo "Rebuild completed"

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: comet-browser/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('comet-browser/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build Linux
        working-directory: comet-browser
        env:
          NEXT_PUBLIC_APP_NAME: Comet
          NEXT_PUBLIC_APP_VERSION: ${{ github.ref_name }}
          ELECTRON_CACHE_DIR: ${{ env.ELECTRON_CACHE_DIR }}
        run: npm run build && npx electron-builder --linux AppImage --x64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-desktop-linux-${{ github.run_number }}
          path: comet-browser/release/*.AppImage
          retention-days: 5

  # ============================================================================
  # ARTIFACT SUMMARY
  # ============================================================================
  summary:
    name: Build Summary
    needs: [build-android, build-ios, build-desktop-windows, build-desktop-macos, build-desktop-linux]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Job Results
        run: |
          echo "Build Results:"
          echo "=============="
          echo "Android: ${{ needs.build-android.result }}"
          echo "iOS: ${{ needs.build-ios.result }}"
          echo "Windows: ${{ needs.build-desktop-windows.result }}"
          echo "macOS: ${{ needs.build-desktop-macos.result }}"
          echo "Linux: ${{ needs.build-desktop-linux.result }}"
          
          # Fail if any critical build failed
          if [[ "${{ needs.build-desktop-windows.result }}" == "failure" ]] || \
             [[ "${{ needs.build-desktop-macos.result }}" == "failure" ]] || \
             [[ "${{ needs.build-desktop-linux.result }}" == "failure" ]]; then
            echo "::error::Desktop build failed!"
            exit 1
          fi
