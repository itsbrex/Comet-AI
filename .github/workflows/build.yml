  # ============================================================================
  # CURRENT MOBILE CONFIGURATION (flutter_browser_app)
  # This is the new primary mobile build job for Comet-AI.
  # ============================================================================

  build-flutter-browser:
    name: Build Flutter Browser (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        target: [android, ios]
        include:
          - target: android
            os: ubuntu-latest
          - target: ios
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (Android)
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: flutter_browser_app
        run: |
          flutter precache --ios
          flutter pub get

      - name: Build Android APK
        if: matrix.target == 'android'
        working-directory: flutter_browser_app
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4096m"
        run: flutter build apk --release

      - name: Build iOS App
        if: matrix.target == 'ios'
        working-directory: flutter_browser_app
        run: flutter build ios --release --no-codesign

      - name: Upload Flutter Browser Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-browser-${{ matrix.target }}
          path: |
            flutter_browser_app/build/app/outputs/flutter-apk/app-release.apk
            flutter_browser_app/build/ios/iphoneos/Runner.app

  build-desktop:
    name: Build Desktop (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        target: [windows, macos, linux]
        include:
          - target: windows
            os: windows-latest
            build_cmd: npm run dist:win
            artifact_path: comet-browser/release/*.exe
          - target: macos
            os: macos-latest
            build_cmd: npm run dist:mac
            artifact_path: comet-browser/release/*.dmg
          - target: linux
            os: ubuntu-latest
            build_cmd: npm run build && npx electron-builder --linux AppImage --x64
            artifact_path: comet-browser/release/*.AppImage

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: comet-browser/package-lock.json

      - name: Install Linux Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libarchive-tools icnsutils libxtst-dev libpng-dev libx11-dev

      - name: Install dependencies (Browser)
        working-directory: comet-browser
        run: npm install --legacy-peer-deps


      - name: Build Desktop App
        working-directory: comet-browser
        env:
          NEXT_PUBLIC_APP_NAME: Comet
          NEXT_PUBLIC_APP_VERSION: 0.1.7
        run: ${{ matrix.build_cmd }}

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}
