name: 🚀 Release Build (Landing Page Optimized)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (leave empty to auto-detect from package.json)'
        required: false
        type: string
      release_name:
        description: 'Release Name'
        required: false
        type: string
      update_firebase:
        description: 'Update Firebase with download links'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  FLUTTER_VERSION: 'stable'

jobs:
  # ============================================================================
  # GET VERSION
  # ============================================================================
  get-version:
    name: Get Version Info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./comet-browser/package.json').version")
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "release_name=Comet AI v${VERSION}" >> $GITHUB_OUTPUT

  # ============================================================================
  # ANDROID BUILD
  # ============================================================================
  build-android:
    name: Build Android
    needs: get-version
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Flutter Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.flutter
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        working-directory: flutter_browser_app
        run: flutter pub get

      - name: Create google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > flutter_browser_app/android/app/google-services.json
          fi

      - name: Decode Keystore
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | sed 's/-----BEGIN CERTIFICATE-----//g' | sed 's/-----END CERTIFICATE-----//g' | tr -d '\n\r' | base64 -d > flutter_browser_app/android/app/upload-keystore.jks
          fi

      - name: Create key.properties
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > flutter_browser_app/android/key.properties
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> flutter_browser_app/android/key.properties
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> flutter_browser_app/android/key.properties
            echo "storeFile=upload-keystore.jks" >> flutter_browser_app/android/key.properties
          fi

      - name: Build APK
        working-directory: flutter_browser_app
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4096m"
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp flutter_browser_app/build/app/outputs/flutter-apk/app-release.apk "app-release.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-android
          path: app-release.apk

  # ============================================================================
  # IOS BUILD
  # ============================================================================
  build-ios:
    name: Build iOS
    needs: get-version
    runs-on: macos-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        working-directory: flutter_browser_app
        run: flutter pub get

      - name: Create GoogleService-Info.plist
        continue-on-error: true
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" > flutter_browser_app/ios/Runner/GoogleService-Info.plist
          fi

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: flutter_browser_app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('flutter_browser_app/ios/Podfile.lock') }}

      - name: Build iOS
        working-directory: flutter_browser_app
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: flutter_browser_app
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Comet-AI.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-ios
          path: flutter_browser_app/Comet-AI.ipa

  # ============================================================================
  # DESKTOP BUILD
  # ============================================================================
  build-desktop:
    name: Build Desktop (${{ matrix.target }})
    needs: get-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        target: [windows, macos, linux]
        include:
          - target: windows
            os: windows-latest
            build_cmd: npm run dist:win
            artifact_glob: "comet-browser/release/*.exe"
            artifact_name: comet-ai-windows
          - target: macos
            os: macos-latest
            build_cmd: npm run dist:mac
            artifact_glob: "comet-browser/release/*.dmg"
            artifact_name: comet-ai-macos
          - target: linux
            os: ubuntu-latest
            build_cmd: npm run build && npx electron-builder --linux AppImage --x64
            artifact_glob: "comet-browser/release/*.AppImage"
            artifact_name: comet-ai-linux

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: comet-browser/package-lock.json

      - name: Install Linux Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libarchive-tools icnsutils libxtst-dev libpng-dev libx11-dev

      - name: Install Dependencies
        working-directory: comet-browser
        run: npm install --legacy-peer-deps

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: comet-browser/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('comet-browser/package-lock.json') }}

      - name: Build App
        working-directory: comet-browser
        env:
          NEXT_PUBLIC_APP_NAME: Comet
          NEXT_PUBLIC_APP_VERSION: ${{ needs.get-version.outputs.version }}
        run: ${{ matrix.build_cmd }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}

  # ============================================================================
  # CREATE RELEASE
  # ============================================================================
  create-release:
    name: Create Release
    needs: [get-version, build-android, build-ios, build-desktop]
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List Artifacts
        run: ls -la release-artifacts/

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Download Comet AI Browser v${{ needs.get-version.outputs.version }}
            
            ### Desktop
            - 🪟 **Windows**: `Comet.Browser.Setup.*.exe`
            - 🍎 **macOS**: `Comet.Browser-*.dmg`
            - 🐧 **Linux**: `Comet.Browser-*.AppImage`
            
            ### Mobile
            - 📱 **Android**: `app-release.apk`
            - 🍎 **iOS**: `Comet-AI.ipa`
            
            ### Changes
            - Full cross-platform build
            - Optimized for landing page integration
            
            Built with ❤️ by [Latestinssan](https://github.com/Preet3627)
          draft: false
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}

      - name: Upload Release Assets
        run: |
          for file in release-artifacts/*; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload "${{ needs.get-version.outputs.tag }}" "$file" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # UPDATE FIREBASE CONFIG (Optional)
  # ============================================================================
  update-firebase:
    name: Update Firebase Config
    needs: [get-version, create-release]
    runs-on: ubuntu-latest
    if: inputs.update_firebase == true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Update Firebase Downloads Config
        run: |
          TAG="${{ needs.get-version.outputs.tag }}"
          API_URL="https://api.github.com/repos/Preet3627/Comet-AI/releases/latest"
          
          # Get download URLs
          WINDOWS_URL="https://github.com/Preet3627/Comet-AI/releases/download/${TAG}/$(ls release-artifacts/*.exe 2>/dev/null | head -1 | xargs basename)"
          MAC_URL="https://github.com/Preet3627/Comet-AI/releases/download/${TAG}/$(ls release-artifacts/*.dmg 2>/dev/null | head -1 | xargs basename)"
          LINUX_URL="https://github.com/Preet3627/Comet-AI/releases/download/${TAG}/$(ls release-artifacts/*.AppImage 2>/dev/null | head -1 | xargs basename)"
          ANDROID_URL="https://github.com/Preet3627/Comet-AI/releases/download/${TAG}/app-release.apk"
          IOS_URL="https://github.com/Preet3627/Comet-AI/releases/download/${TAG}/Comet-AI.ipa"
          
          echo "::notice::Windows: $WINDOWS_URL"
          echo "::notice::macOS: $MAC_URL"
          echo "::notice::Linux: $LINUX_URL"
          echo "::notice::Android: $ANDROID_URL"
          echo "::notice::iOS: $IOS_URL"
          
          # Create config update script
          cat > update-firebase-config.js << 'EOF'
          const admin = require('firebase-admin');
          const { initializeApp } = require('firebase-admin/firebase-app');
          
          // This would need proper Firebase Admin SDK setup
          // For now, we'll output the values that need to be updated
          console.log('Config values for Firebase:');
          console.log(JSON.stringify({
            windows: process.env.WINDOWS_URL,
            mac: process.env.MAC_URL,
            linux: process.env.LINUX_URL,
            android: process.env.ANDROID_URL,
            ios: process.env.IOS_URL
          }, null, 2));
          EOF
          
          echo "WINDOWS_URL=$WINDOWS_URL" >> $GITHUB_ENV
          echo "MAC_URL=$MAC_URL" >> $GITHUB_ENV
          echo "LINUX_URL=$LINUX_URL" >> $GITHUB_ENV
          echo "ANDROID_URL=$ANDROID_URL" >> $GITHUB_ENV
          echo "IOS_URL=$IOS_URL" >> $GITHUB_ENV
        env:
          TAG: ${{ needs.get-version.outputs.tag }}

      - name: Update Firebase via REST API
        run: |
          # Use Firebase REST API to update config
          curl -X PATCH \
            "https://${{ secrets.FIREBASE_PROJECT_ID }}-default-rtdb.firebaseio.com/config/downloads.json?auth=${{ secrets.FIREBASE_ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"windows\":\"${{ env.WINDOWS_URL }}\",\"mac\":\"${{ env.MAC_URL }}\",\"linux\":\"${{ env.LINUX_URL }}\",\"android\":\"${{ env.ANDROID_URL }}\",\"ios\":\"${{ env.IOS_URL }}\"}"
        continue-on-error: true

  # ============================================================================
  # SUCCESS NOTIFICATION
  # ============================================================================
  notify:
    name: Release Complete
    needs: [get-version, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Success Summary
        run: |
          echo "✅ Release v${{ needs.get-version.outputs.version }} created successfully!"
          echo "📦 All artifacts uploaded to GitHub Releases"
          echo "🔗 Release URL: https://github.com/Preet3627/Comet-AI/releases/${{ needs.get-version.outputs.tag }}"
          echo ""
          echo "🚀 Landing page will automatically detect this release via GitHub API."
