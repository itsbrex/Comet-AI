name: Publish Release (Stable)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.4)'
        required: false
      update_firebase:
        description: 'Update Firebase'
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

env:
  NODE_VERSION: '20'
  FLUTTER_VERSION: 'stable'
  ELECTRON_CACHE_DIR: '.electron-cache'

jobs:
  # ============================================================================
  # PARSE VERSION
  # ============================================================================
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_stable: ${{ steps.version.outputs.is_stable }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="v$(node -p "require('./comet-browser/package.json').version")"
          fi
          
          VERSION="${TAG#v}"
          
          if [[ "$TAG" == *"-"* ]]; then
            IS_STABLE="false"
          else
            IS_STABLE="true"
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_stable=$IS_STABLE" >> $GITHUB_OUTPUT

      - name: Check tag exists
        run: |
          if git tag | grep -q "^${{ steps.version.outputs.tag }}$"; then
            echo "::warning::Tag ${{ steps.version.outputs.tag }} already exists"
          fi

  # ============================================================================
  # ANDROID BUILD
  # ============================================================================
  build-android:
    name: Build Android
    needs: get-version
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          flutter-version: '3.27.0'

      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        working-directory: flutter_browser_app
        run: flutter pub get

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > flutter_browser_app/android/app/google-services.json
          fi

      - name: Decode Keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | sed 's/-----BEGIN CERTIFICATE-----//g' | sed 's/-----END CERTIFICATE-----//g' | tr -d '\n\r' | base64 -d > flutter_browser_app/android/app/upload-keystore.jks

      - name: Create key.properties
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > flutter_browser_app/android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> flutter_browser_app/android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> flutter_browser_app/android/key.properties
          echo "storeFile=upload-keystore.jks" >> flutter_browser_app/android/key.properties

      - name: Build APK
        working-directory: flutter_browser_app
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4096m"
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-android
          path: flutter_browser_app/build/app/outputs/flutter-apk/app-release.apk

  # ============================================================================
  # IOS BUILD
  # ============================================================================
  build-ios:
    name: Build iOS
    needs: get-version
    runs-on: macos-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          flutter-version: '3.27.0'

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: flutter_browser_app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('flutter_browser_app/ios/Podfile.lock') }}

      - name: Install dependencies
        working-directory: flutter_browser_app
        run: flutter pub get

      - name: Create GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" > flutter_browser_app/ios/Runner/GoogleService-Info.plist
          fi

      - name: Build iOS
        working-directory: flutter_browser_app
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: flutter_browser_app
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Comet-AI.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-ios
          path: flutter_browser_app/Comet-AI.ipa

  # ============================================================================
  # DESKTOP BUILD - WINDOWS
  # ============================================================================
  build-desktop-windows:
    name: Build Desktop (Windows)
    needs: get-version
    runs-on: windows-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: comet-browser/package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ${{ env.ELECTRON_CACHE_DIR }}
          key: ${{ runner.os }}-electron-${{ hashFiles('comet-browser/package-lock.json') }}

      - name: Install Dependencies (npm ci - deterministic)
        working-directory: comet-browser
        run: npm ci --legacy-peer-deps

      - name: Rebuild Native Modules
        working-directory: comet-browser
        run: |
          npx electron-rebuild -f -w robotjs || npx electron-rebuild -f -w sharp || echo "Native rebuild completed"

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: comet-browser/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('comet-browser/package-lock.json') }}

      - name: Build Windows
        working-directory: comet-browser
        env:
          NEXT_PUBLIC_APP_NAME: Comet
          NEXT_PUBLIC_APP_VERSION: ${{ needs.get-version.outputs.version }}
          ELECTRON_CACHE_DIR: ${{ env.ELECTRON_CACHE_DIR }}
        run: npm run dist:win

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-windows
          path: comet-browser/release/*.{exe,msix,appx}

  # ============================================================================
  # DESKTOP BUILD - MACOS
  # ============================================================================
  build-desktop-macos:
    name: Build Desktop (macOS)
    needs: get-version
    runs-on: macos-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: comet-browser/package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ${{ env.ELECTRON_CACHE_DIR }}
          key: ${{ runner.os }}-electron-${{ hashFiles('comet-browser/package-lock.json') }}

      - name: Install Dependencies (npm ci - deterministic)
        working-directory: comet-browser
        run: npm ci --legacy-peer-deps

      - name: Rebuild Native Modules
        working-directory: comet-browser
        run: |
          npx electron-rebuild -f -w robotjs || npx electron-rebuild -f -w sharp || echo "Native rebuild completed"

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: comet-browser/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('comet-browser/package-lock.json') }}

      - name: Build macOS
        working-directory: comet-browser
        env:
          NEXT_PUBLIC_APP_NAME: Comet
          NEXT_PUBLIC_APP_VERSION: ${{ needs.get-version.outputs.version }}
          ELECTRON_CACHE_DIR: ${{ env.ELECTRON_CACHE_DIR }}
        run: npm run dist:mac

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-macos
          path: comet-browser/release/*.dmg

  # ============================================================================
  # DESKTOP BUILD - LINUX
  # ============================================================================
  build-desktop-linux:
    name: Build Desktop (Linux)
    needs: get-version
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libarchive-tools \
            icnsutils libxtst-dev libpng-dev libx11-dev \
            libsecret-1-dev libx11-xcb-dev libxcb-dri3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: comet-browser/package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ${{ env.ELECTRON_CACHE_DIR }}
          key: ${{ runner.os }}-electron-${{ hashFiles('comet-browser/package-lock.json') }}

      - name: Install Dependencies (npm ci - deterministic)
        working-directory: comet-browser
        run: npm ci --legacy-peer-deps

      - name: Rebuild Native Modules
        working-directory: comet-browser
        run: |
          npx electron-rebuild -f -w robotjs || npx electron-rebuild -f -w sharp || echo "Native rebuild completed"

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: comet-browser/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('comet-browser/package-lock.json') }}

      - name: Build Linux
        working-directory: comet-browser
        env:
          NEXT_PUBLIC_APP_NAME: Comet
          NEXT_PUBLIC_APP_VERSION: ${{ needs.get-version.outputs.version }}
          ELECTRON_CACHE_DIR: ${{ env.ELECTRON_CACHE_DIR }}
        run: npm run build && npx electron-builder --linux AppImage --x64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-linux
          path: comet-browser/release/*.AppImage

  # ============================================================================
  # CREATE RELEASE
  # ============================================================================
  create-release:
    name: Create Release
    needs: [get-version, build-android, build-ios, build-desktop-windows, build-desktop-macos, build-desktop-linux]
    runs-on: ubuntu-latest
    environment: Production
    if: always() && needs.get-version.outputs.tag != ''
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List Artifacts
        run: ls -la release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            # Comet AI Browser v${{ needs.get-version.outputs.version }}

            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows | `Comet.Browser.Setup.*.exe` |
            | macOS | `Comet.Browser-*.dmg` |
            | Linux | `Comet.Browser-*.AppImage` |
            | Android | `app-release.apk` |
            | iOS | `Comet-AI.ipa` |

            ---
            Built with by [Latestinssan](https://github.com/Preet3627)
          draft: false
          prerelease: ${{ needs.get-version.outputs.is_stable == 'false' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Assets
        run: |
          for file in release-artifacts/*; do
            if [ -f "$file" ]; then
              gh release upload "${{ needs.get-version.outputs.tag }}" "$file" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # UPDATE FIREBASE
  # ============================================================================
  update-firebase:
    name: Update Firebase
    needs: [get-version, create-release]
    runs-on: ubuntu-latest
    if: needs.create-release.result == 'success' && (inputs.update_firebase == true || github.event.inputs.update_firebase == true)
    environment: Production
    steps:
      - name: Update Firebase Downloads
        run: |
          TAG="${{ needs.get-version.outputs.tag }}"
          
          curl -X PUT \
            "https://${{ secrets.FIREBASE_PROJECT_ID }}-default-rtdb.firebaseio.com/config/downloads.json?auth=${{ secrets.FIREBASE_ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "windows": "https://github.com/Preet3627/Comet-AI/releases/download/'"$TAG"'/Comet.Browser.Setup.exe",
              "mac": "https://github.com/Preet3627/Comet-AI/releases/download/'"$TAG"'/Comet.Browser.dmg",
              "linux": "https://github.com/Preet3627/Comet-AI/releases/download/'"$TAG"'/Comet.Browser.AppImage",
              "android": "https://github.com/Preet3627/Comet-AI/releases/download/'"$TAG"'/app-release.apk",
              "ios": "https://github.com/Preet3627/Comet-AI/releases/download/'"$TAG"'/Comet-AI.ipa"
            }'
        continue-on-error: true
