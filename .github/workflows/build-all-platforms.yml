build-desktop:
  name: Build Desktop (${{ matrix.target }})
  environment: Production
  runs-on: ${{ matrix.os }}

  strategy:
      matrix:
        target: [windows, macos, linux]
        include:
          - target: windows
            os: windows-latest
            build_cmd: npm run dist:win
            artifact_path: comet-browser/release/*.exe

          - target: macos
            os: macos-latest
            build_cmd: npm run build && electron-builder --mac --publish never
            artifact_path: comet-browser/release/*.dmg

          - target: linux
            os: ubuntu-latest
            build_cmd: npm run build && npx electron-builder --linux AppImage --x64 --publish never
            artifact_path: comet-browser/release/*.AppImage

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # Setup Node
      # ----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: comet-browser/package-lock.json

      # ----------------------------
      # Cache Electron binaries
      # ----------------------------
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('comet-browser/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      # ----------------------------
      # Cache electron-builder
      # ----------------------------
      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('comet-browser/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      # ----------------------------
      # Cache Next.js
      # ----------------------------
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: comet-browser/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('comet-browser/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      # ----------------------------
      # Linux system deps
      # ----------------------------
      - name: Install Linux Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libarchive-tools icnsutils libxtst-dev libpng-dev libx11-dev

      # ----------------------------
      # Install Dependencies (CORRECT WAY)
      # ----------------------------
      - name: Install Dependencies
        working-directory: comet-browser
        run: npm ci --legacy-peer-deps

      # ----------------------------
      # Rebuild native modules
      # ----------------------------
      - name: Rebuild native modules (robotjs)
        working-directory: comet-browser
        run: npm rebuild robotjs || npm install --force

      # ----------------------------
      # Build
      # ----------------------------
      - name: Build App
        working-directory: comet-browser
        env:
          NEXT_PUBLIC_APP_NAME: Comet
          NEXT_PUBLIC_APP_VERSION: 3.1.0
        run: ${{ matrix.build_cmd }}

      # ----------------------------
      # Upload Artifact
      # ----------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: comet-ai-desktop-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}
